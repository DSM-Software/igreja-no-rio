<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Igreja no Rio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Mulish:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<script src="app/image-slot.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    /* Brand palette — turquesa / marinho / branco */
    --teal-50:  #ECF8F6;
    --teal-100: #D6F1ED;
    --teal-200: #A9E3DC;
    --teal-300: #7DD4CA;
    --teal-400: #5CC8BD;
    --teal-500: #45C0B4; /* primary */
    --teal-600: #2EA89C;
    --teal-700: #237F76;

    --navy-900: #161D29;
    --navy-800: #1D2532; /* hero dark */
    --navy-700: #283143;
    --navy-600: #38445B;

    --ink:    #1F2630;
    --ink-2:  #424B57;
    --muted:  #6B7480;
    --muted-2:#9AA2AD;

    --paper:  #FFFFFF;
    --bg:     #F5F8F8;
    --bg-2:   #EEF4F3;
    --border: #E4EAE9;
    --border-2:#D5DEDC;

    --accent: var(--teal-500);
    --accent-ink: #0E3B36;

    --r-sm: 8px;
    --r-md: 12px;
    --r-lg: 18px;
    --r-xl: 26px;
    --r-2xl: 34px;
    --r-pill: 999px;

    --shadow-sm: 0 1px 2px rgba(22,29,41,.06), 0 1px 3px rgba(22,29,41,.05);
    --shadow-md: 0 6px 18px rgba(22,29,41,.08), 0 2px 6px rgba(22,29,41,.05);
    --shadow-lg: 0 18px 50px rgba(22,29,41,.14), 0 6px 16px rgba(22,29,41,.08);
    --shadow-teal: 0 14px 34px rgba(45,168,156,.32);

    --font-display: 'Poppins', system-ui, sans-serif;
    --font-body: 'Mulish', system-ui, sans-serif;

    --maxw: 1180px;
    --nav-h: 76px;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: var(--font-body);
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  h1, h2, h3, h4, h5, .font-display { font-family: var(--font-display); }
  h1, h2, h3, h4 { line-height: 1.04; letter-spacing: -0.02em; color: var(--ink); margin: 0; text-wrap: balance; }
  p { margin: 0; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }
  img { display: block; max-width: 100%; }
  iconify-icon { display: inline-block; vertical-align: -0.125em; }
  ::selection { background: var(--teal-200); color: var(--accent-ink); }

  input, textarea, select {
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--ink);
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 99px; border: 3px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted-2); }

  .reveal { opacity: 0; transform: translateY(22px); transition: opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: none; }

  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  @keyframes spin-slow { to { transform: rotate(360deg); } }

  #root { min-height: 100vh; display: flex; flex-direction: column; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="app/store.jsx"></script>
<script type="text/babel" src="app/tweaks-panel.jsx"></script>
<script type="text/babel" src="app/ui.jsx"></script>
<script type="text/babel" src="app/home.jsx"></script>
<script type="text/babel" src="app/pages.jsx"></script>
<script type="text/babel" src="app/blog.jsx"></script>
<script type="text/babel" src="app/downloads.jsx"></script>
<script type="text/babel" src="app/admin.jsx"></script>
<script type="text/babel" src="app/app.jsx"></script>
</body>
</html>
