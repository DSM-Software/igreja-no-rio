# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf — Igreja no Rio (produção)
#
# Estrutura de certificados esperada (Let's Encrypt / Certbot):
#   nginx/certs/live/igrejanorio.com.br/fullchain.pem
#   nginx/certs/live/igrejanorio.com.br/privkey.pem
#
# Para obter os certificados pela primeira vez (na VPS):
#   apt install certbot
#   certbot certonly --standalone -d igrejanorio.com.br -d www.igrejanorio.com.br
#   # Após: copie /etc/letsencrypt/ → ./nginx/certs/
#
# Renovação automática (crontab):
#   0 3 * * * certbot renew --quiet && docker compose -f docker-compose.prod.yml restart nginx
# ─────────────────────────────────────────────────────────────────────────────

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  # ── Performance ────────────────────────────────────────────────────────────
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 100M;   # uploads de áudio/PDF podem ser grandes

  # ── Gzip ───────────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_comp_level 6;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml
    application/rss+xml font/truetype font/opentype
    image/svg+xml image/x-icon;

  # ── Rate limiting ──────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=admin:10m rate=20r/m;

  # ── Upstream ───────────────────────────────────────────────────────────────
  upstream nextjs {
    server app:3000;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
  server {
    listen 80;
    listen [::]:80;
    server_name igrejanorio.com.br www.igrejanorio.com.br;

    # Certbot ACME challenge (renovação de certificado)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://igrejanorio.com.br$request_uri;
    }
  }

  # ── www → apex redirect ───────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.igrejanorio.com.br;

    ssl_certificate     /etc/letsencrypt/live/igrejanorio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/igrejanorio.com.br/privkey.pem;

    return 301 https://igrejanorio.com.br$request_uri;
  }

  # ── Site principal ────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name igrejanorio.com.br;

    # ── SSL ──────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/igrejanorio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/igrejanorio.com.br/privkey.pem;

    # Configurações SSL modernas (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security headers ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; img-src 'self' data: blob: https://*.amazonaws.com https://*.r2.cloudflarestorage.com http://localhost:9000 http://minio:9000; media-src 'self' data: blob: https: http:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https: http: ws: wss:; form-action 'self'; upgrade-insecure-requests" always;

    # ── Admin — rate limiting ─────────────────────────────────────────────
    location /admin {
      limit_req zone=admin burst=10 nodelay;
      proxy_pass http://nextjs;
      include /etc/nginx/snippets/proxy-headers.conf;
    }

    # ── API — rate limiting ───────────────────────────────────────────────
    location /api {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://nextjs;
      include /etc/nginx/snippets/proxy-headers.conf;
    }

    # ── Arquivos estáticos Next.js (cache longo) ──────────────────────────
    location /_next/static/ {
      proxy_pass http://nextjs;
      proxy_cache_valid 200 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
      include /etc/nginx/snippets/proxy-headers.conf;
    }

    # ── Arquivos públicos (logos, imagens estáticas) ──────────────────────
    location /public/ {
      proxy_pass http://nextjs;
      add_header Cache-Control "public, max-age=86400";
      include /etc/nginx/snippets/proxy-headers.conf;
    }

    # ── Tudo o mais → Next.js ─────────────────────────────────────────────
    location / {
      proxy_pass http://nextjs;
      include /etc/nginx/snippets/proxy-headers.conf;
    }
  }
}
