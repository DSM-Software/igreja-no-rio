name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tags: mouradsm/igreja-rio:runtime  e  mouradsm/igreja-rio:sha-<short>
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: mouradsm/igreja-rio
          tags: |
            type=raw,value=runtime
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SERVER_URL=https://igrejanorio.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Dispatch Dokploy deploy webhook
        if: ${{ contains(steps.meta.outputs.tags, ':runtime') }}
        run: curl --fail -X POST "${{ secrets.DOKPLOY_DEPLOY_WEBHOOK_URL }}"
