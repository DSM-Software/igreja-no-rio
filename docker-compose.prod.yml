# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.prod.yml — stack de produção (self-hosted)
#
# Pré-requisitos:
#   1. Copiar .env.production.example → .env.production e preencher
#   2. Criar certificados SSL em ./nginx/certs/ (Let's Encrypt / Certbot)
#
# Deploy:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Build da imagem (precisa ser feito ANTES do up):
#   docker compose -f docker-compose.prod.yml --env-file .env.production build
#
# Seed inicial (somente primeira vez):
#   docker compose -f docker-compose.prod.yml --env-file .env.production \
#     exec app node -e "require('./scripts/seed.js')"
#   (ou: copiar o seed para um script standalone que não precise de tsx)
#
# Logs:
#   docker compose -f docker-compose.prod.yml logs -f
#
# Atualizar app (zero-downtime com recreate):
#   docker compose -f docker-compose.prod.yml build app
#   docker compose -f docker-compose.prod.yml up -d --no-deps app
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-igreja_no_rio}
      POSTGRES_USER: ${POSTGRES_USER:-igrejario}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env.production}
    volumes:
      - db_data:/var/lib/postgresql/data
    # Postgres NÃO expõe porta externamente em produção (acesso apenas interno)
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-igrejario} -d ${POSTGRES_DB:-igreja_no_rio}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  # ── MinIO (S3 auto-hospedado) ─────────────────────────────────────────────
  # Se preferir AWS S3 ou Cloudflare R2 gerenciados, remova este bloco
  # e configure as vars S3_* diretamente no serviço app.
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Defina MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Defina MINIO_ROOT_PASSWORD (mín. 8 chars)}
      # Permite que os URLs de assets sejam públicos
      MINIO_BROWSER_REDIRECT_URL: https://${DOMAIN:-igrejanorio.com}/minio
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-igreja-no-rio}
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/$$S3_BUCKET &&
        mc anonymous set public local/$$S3_BUCKET/media &&
        echo 'Bucket criado: '$$S3_BUCKET
      "
    restart: "no"
    networks:
      - backend

  # ── Aplicação Next.js + Payload ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* são embutidos no bundle — deve ser a URL real de produção
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-https://igrejanorio.com}
    image: igreja-no-rio:latest
    restart: always
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      # Banco
      DATABASE_URI: postgresql://${POSTGRES_USER:-igrejario}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-igreja_no_rio}
      # Payload
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?Defina PAYLOAD_SECRET (openssl rand -hex 32)}
      # S3 / MinIO
      S3_BUCKET: ${S3_BUCKET:-igreja-no-rio}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-${MINIO_ROOT_USER}}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-${MINIO_ROOT_PASSWORD}}
      # Se usar MinIO auto-hospedado:
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      # URL pública
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-https://igrejanorio.com}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health 2>/dev/null | grep -q ok || wget -qO- http://localhost:3000 > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - backend
      - frontend

  # ── Nginx (reverse proxy + SSL) ───────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/letsencrypt:ro          # certificados Let's Encrypt
      - nginx_cache:/var/cache/nginx
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && wget -qO- http://localhost/health > /dev/null 2>&1 || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - frontend

volumes:
  db_data:
    driver: local
  minio_data:
    driver: local
  nginx_cache:
    driver: local

networks:
  backend:
    internal: true       # DB e MinIO não acessíveis de fora
  frontend:
    driver: bridge       # nginx ↔ app; nginx expõe 80/443
