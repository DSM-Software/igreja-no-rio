# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.prod.yml — stack de produção (self-hosted)
#
# Pré-requisitos:
#   1. Copiar .env.production.example → .env.production e preencher
#   2. Criar certificados SSL em ./nginx/certs/ (Let's Encrypt / Certbot)
#
# Deploy:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Build da imagem (precisa ser feito ANTES do up):
#   docker compose -f docker-compose.prod.yml --env-file .env.production build
#
# Seed inicial (somente primeira vez):
#   docker compose -f docker-compose.prod.yml --env-file .env.production \
#     exec app node -e "require('./scripts/seed.js')"
#   (ou: copiar o seed para um script standalone que não precise de tsx)
#
# Logs:
#   docker compose -f docker-compose.prod.yml logs -f
#
# Atualizar app (zero-downtime com recreate):
#   docker compose -f docker-compose.prod.yml build app
#   docker compose -f docker-compose.prod.yml up -d --no-deps app
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-igreja_no_rio}
      POSTGRES_USER: ${POSTGRES_USER:-igrejario}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env.production}
    volumes:
      - db_data:/var/lib/postgresql/data
    # Postgres NÃO expõe porta externamente em produção (acesso apenas interno)
    expose:
      - "5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-igrejario} -d ${POSTGRES_DB:-igreja_no_rio}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  # ── Aplicação Next.js + Payload ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* são embutidos no bundle — deve ser a URL real de produção
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-https://igrejanorio.com}
    image: igreja-no-rio:latest
    restart: always
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      # Banco
      DATABASE_URI: postgresql://${POSTGRES_USER:-igrejario}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-igreja_no_rio}
      # Payload
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?Defina PAYLOAD_SECRET (openssl rand -hex 32)}
      # S3 / MinIO
      S3_BUCKET: ${S3_BUCKET:-igreja-no-rio}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-${MINIO_ROOT_USER}}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-${MINIO_ROOT_PASSWORD}}
      # Se usar MinIO auto-hospedado:
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      # URL pública
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-https://igrejanorio.com}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3000/api/health 2>/dev/null | grep -q ok || wget -qO- http://localhost:3000 > /dev/null 2>&1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - backend
      - frontend

volumes:
  db_data:
    driver: local

networks:
  backend:
    internal: true # DB e MinIO não acessíveis de fora
  frontend:
    driver: bridge # nginx ↔ app; nginx expõe 80/443
