# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — ambiente de desenvolvimento
#
# Uso:
#   docker compose up            → sobe tudo (db + minio + app)
#   docker compose up db minio   → só os serviços de apoio (rode `npm run dev` localmente)
#   docker compose logs -f app   → ver logs do Next.js
#   docker compose exec app sh   → acessar shell da app
#
# Acesso:
#   Site:          http://localhost:3000
#   Payload admin: http://localhost:3000/admin
#   MinIO console: http://localhost:9001  (login: minio / minio123)
#   MinIO S3:      http://localhost:9000
#   PostgreSQL:    localhost:5432
#
# Seed (após `docker compose up -d`):
#   docker compose exec app npm run seed
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: igreja_no_rio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d igreja_no_rio"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO (S3 local) ──────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Cria o bucket automaticamente na primeira subida
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minio minio123 &&
        mc mb --ignore-existing local/igreja-no-rio &&
        mc anonymous set public local/igreja-no-rio/media &&
        echo 'Bucket igreja-no-rio criado.'
      "
    restart: "no"

  # ── Aplicação Next.js + Payload (hot reload) ──────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Monta o código-fonte para hot reload.
    # O node_modules do container é preservado pelo named volume.
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      # Banco
      DATABASE_URI: postgresql://postgres:postgres@db:5432/igreja_no_rio
      # Payload
      PAYLOAD_SECRET: dev-secret-nao-use-em-producao
      # S3 / MinIO local
      S3_BUCKET: igreja-no-rio
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minio
      S3_SECRET_ACCESS_KEY: minio123
      S3_ENDPOINT: http://minio:9000
      # URL pública (browser acessa via localhost)
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      PAYLOAD_SERVER_URL: http://localhost:3000
      PAYLOAD_TRUSTED_ORIGINS: http://localhost:3000
      PAYLOAD_CSRF_ORIGINS: http://localhost:3000
      # Seed local (altere antes de usar fora de desenvolvimento)
      SEED_ADMIN_EMAIL: admin.local@igrejanorio.test
      SEED_ADMIN_PASSWORD: troque-por-uma-senha-forte-local
      SEED_ADMIN_NAME: Admin Local
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  db_data:
  minio_data:
  node_modules:    # preserva node_modules instalado no container
  next_cache:      # cache do .next entre reinícios
